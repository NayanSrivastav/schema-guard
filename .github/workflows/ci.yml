name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true

    - name: Run Linter
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        working-directory: ./

    - name: Run Tests
      run: |
        go mod tidy
        go test -v -cover ./...
