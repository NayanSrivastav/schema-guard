name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'
        cache: true
    - name: Download Go Dependencies
      run: go mod download && go mod tidy

    - name: Run Native Linter (Go Vet)
      run: go vet ./...

    - name: Run Tests
      run: go test -v ./...

  publish-pypi:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Build Python SDK Wheel
      run: |
        python -m pip install --upgrade pip build
        cd sdks/python
        python -m build

    - name: Publish Python SDK strictly via OIDC Trusted Publisher Actions
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: sdks/python/dist/
