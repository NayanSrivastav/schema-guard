name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'
        cache: true
    - name: Download Go Dependencies
      run: go mod download && go mod tidy

    - name: Run Native Linter (Go Vet)
      run: go vet ./...

    - name: Run Tests
      run: go test -v ./...
