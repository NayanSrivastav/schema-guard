apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schemaguard.fullname" . }}-api
  labels:
    app: schemaguard-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: schemaguard-api
  template:
    metadata:
      labels:
        app: schemaguard-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /v1/stats
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
