version: '3.8'

services:
  schemaguard-api:
    image: golang:1.21-alpine
    working_dir: /app
    volumes:
      - .:/app
    # Mock startup bridging to future generic main
    command: >
      sh -c "echo 'Starting SchemaGuard Golang Server API...' && sleep infinity" 
    ports:
      - "8080:8080"
    environment:
      - ENV=development

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
