services:
  schemaguard-api:
    build: .
    ports:
      - "8085:8080"
    environment:
      - ENV=development

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
